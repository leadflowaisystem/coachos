version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Only auto-update patch/minor. Pin major updates for manual review.
      - dependency-name: "*"
        update-types: [version-update:semver-major]
